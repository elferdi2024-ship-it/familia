version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router)
  - Firebase (Firestore & Auth)
  - CSS Modules / Tailwind CSS
  - Material Icons
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Home page with featured properties and quick search
  - path: /search
    file: app/search/page.tsx
    auth_required: false
    description: Advanced search with filters and map view
  - path: /property/[id]
    file: app/property/[id]/page.tsx
    auth_required: false
    description: Detailed property view with contact form and map
  - path: /favorites
    file: app/favorites/page.tsx
    auth_required: true (optional for guest)
    description: User's saved properties
  - path: /saved-searches
    file: app/saved-searches/page.tsx
    auth_required: true
    description: List of saved search criteria with real-time sync
  - path: /profile
    file: app/profile/page.tsx
    auth_required: true
    description: User profile and settings
  - path: /my-properties
    file: app/my-properties/page.tsx
    auth_required: true
    description: Agent dashboard for managing listed properties
  - path: /compare
    file: app/compare/page.tsx
    auth_required: false
    description: Side-by-side property comparison
  - path: /publish
    file: app/publish/page.tsx
    auth_required: true
    description: Multi-step property listing entry point
features:
  - name: Advanced Real Estate Search
    description: Dynamic filtering system with map toggle and real-time POI
    files:
      - app/search/page.tsx
      - components/SmartSearch.tsx
    entry_route: /search
    user_interactions:
      - Select operation type (Sale/Rent)
      - Filter by neighborhood, price, bedrooms
      - Toggle between List and Map view
      - Save search for notifications
  - name: Property CRM for Agents
    description: Management of leads and property lifecycle
    files:
      - app/my-properties/page.tsx
      - contexts/PublishContext.tsx
    entry_route: /my-properties
    user_interactions:
      - View list of own properties
      - Track leads per property
      - Edit or delete listings
  - name: Uruguayan Market Specialization
    description: Specific fields for Ley 18.795 (Vivienda Promovida) and local guarantees
    files:
      - lib/data.ts
      - components/PropertyCard.tsx
    user_interactions:
      - Identify properties with tax benefits
      - View accepted rental guarantees (ANDA, Porto, etc.)
known_limitations:
  - issue: Static sitemap for stability
    location: app/sitemap.ts
    impact: Dynamic property URLs need manual or periodic update logic for SEO
  - issue: Search params state management
    location: app/search/page.tsx
    impact: Requires Suspense boundaries to avoid build worker crashes
